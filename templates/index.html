<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
<div class="container text-center mt-5">

    <h1 class="mb-4">🎮 Tic Tac Toe</h1>

    <!-- ================= MODE SELECTION ================= -->
    <div id="modeSelection" class="card p-4 shadow">
        <h3>Select Mode</h3>
        <button id="onePlayer" class="btn btn-primary m-2">1 Player</button>
        <button id="twoPlayer" class="btn btn-success m-2">2 Player</button>
    </div>

    <!-- ================= GAME CONTAINER ================= -->
    <div id="gameContainer" style="display:none;" class="mt-4">

        <!-- STATUS -->
        <h4 id="status" class="mb-3">Current Player: X</h4>

        <!-- CHANGE MODE -->
        <button id="changeMode" class="btn btn-warning mb-3">
            🔄 Change Mode
        </button>

        <!-- ================= BOARD ================= -->
        <div id="board">
            {% for i in range(9) %}
                <div class="cell" data-index="{{ i }}"></div>
            {% endfor %}
        </div>

        <!-- RESET -->
        <button id="reset" class="btn btn-danger mt-3">
            🔁 Reset Game
        </button>

        <!-- ================= LEADERBOARD ================= -->
        <div class="card mt-4 p-3 shadow">
            <h4>🏆 Leaderboard</h4>

            <p>Wins: <span id="wins">0</span></p>
            <p>Loss: <span id="loss">0</span></p>
            <p>Draw: <span id="draw">0</span></p>
        </div>

    </div>

</div>

<!-- JS -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
